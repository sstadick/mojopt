
[workspace]
authors = ["Seth Stadick <sstadick@gmail.com>"]
channels = [
    "https://prefix.dev/conda-forge",
    "https://conda.modular.com/max-nightly",
    "https://repo.prefix.dev/modular-community",
]
platforms = ["linux-64", "osx-arm64"]
preview = ["pixi-build"]

[package]
name = "mojopt"
version = "0.3.0"

[package.build]
backend = { name = "pixi-build-mojo", version = "0.*", channels = [
    "https://prefix.dev/pixi-build-backends",
    "https://prefix.dev/conda-forge",
    "https://repo.prefix.dev/modular-community",
] }

[package.host-dependencies]
mojo-compiler = "==1.0.0b1"

[package.build-dependencies]
mojo-compiler = "==1.0.0b1"

[package.run-dependencies]
mojo-compiler = "==1.0.0b1"

[tasks]
r = "mojo run main.mojo"
t = { cmd = "sh -c 'find ./tests -name test_*.mojo | xargs -I % mojo run -I . -D ASSERT=all %'" }
examples = { cmd = "sh -c 'find ./examples -name *.mojo | xargs -I % mojo run -I . -D ASSERT=all % --help'" }
lint = { cmd = "mojo format --line-length 100 mojopt/* tests/* examples/* scripts/*" }
gen_examples = """
mojo run -I . scripts/generate_readme_examples.mojo --program ./examples/simple.mojo --section-header '## Simple' &&
mojo run -I . scripts/generate_readme_examples.mojo --program ./examples/getting_started.mojo --section-header '## Getting Started' && 
mojo run -I . scripts/generate_readme_examples.mojo --program ./examples/subcommands.mojo --section-header '## Subcommands'
"""

[target.linux-64.tasks]
t = { cmd = "sh -c 'find ./tests -name test_*.mojo | xargs -I % mojo run --target-features=-avx512f,-avx512bw,-avx512cd,-avx512dq,-avx512vl,-avx512ifma,-avx512vbmi,-avx512vbmi2,-avx512vnni,-avx512bitalg,-avx512vpopcntdq,-avx512fp16,-avx512bf16 -I . -D ASSERT=all %'" }
examples = { cmd = "sh -c 'find ./examples -name *.mojo | xargs -I % mojo run --target-features=-avx512f,-avx512bw,-avx512cd,-avx512dq,-avx512vl,-avx512ifma,-avx512vbmi,-avx512vbmi2,-avx512vnni,-avx512bitalg,-avx512vpopcntdq,-avx512fp16,-avx512bf16 -I . -D ASSERT=all % --help'" }

[dependencies]
mojo = "==1.0.0b1"
# mojopt = { path = "." }
